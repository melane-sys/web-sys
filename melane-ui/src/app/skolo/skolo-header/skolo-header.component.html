<header class="main-header w-100" [ngClass]="[
    dark ? 'position-absolute' : '',
    absolute ? 'position-absolute' : ''
  ]">
  <nav class="navbar navbar-expand-xl sticky-header z-10"
    [ngClass]="[dark ? 'navbar-dark' : 'navbar-light', sticky ? 'affix' : '']" (scroll)="onscroll()">
    <div class="container d-flex align-items-center justify-content-lg-between position-relative">
      <a routerLink="/skolo" class="navbar-brand d-flex align-items-center mb-md-0 text-decoration-none">
        <img src="../../../assets/logos/logo.png" alt="logo" class="img-fluid logo-white" />
        <img src="../../../assets/logos/logo.png" alt="logo" class="img-fluid logo-color" />
      </a>
      <button class="navbar-toggler position-absolute right-0 border-0" id="#offcanvasWithBackdrop" role="button">
        <span class="far fa-bars" data-bs-toggle="offcanvas" data-bs-target="#offcanvasWithBackdrop"
          aria-controls="offcanvasWithBackdrop"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-center">
        <ul class="nav col-12 col-md-auto justify-content-center main-menu">
          <li><a routerLink="/" class="nav-link">Home</a></li>
          <li><a routerLink="/skolo" class="nav-link">Skolo</a></li>
          <!-- <li><a routerLink="/skolo/categories" class="nav-link">Categories</a></li> -->
          <li><a routerLink="/skolo/price" class="nav-link">Pricing</a></li>
          <li><a routerLink="/support" class="nav-link">Support</a></li>

        </ul>
      </div>

      <div class="action-btns text-end me-5 me-lg-0 d-none d-md-block d-lg-block">
        <a routerLink="/login" class="btn btn-outline-primary me-2">Sign In</a>
        <a routerLink="/login" class="btn btn-outline-primary me-2">Register</a>
      </div>

      <!--offcanvas menu start-->
      <div class="offcanvas offcanvas-end d-xl-none" tabindex="-1" id="offcanvasWithBackdrop">
        <div class="offcanvas-header d-flex align-items-center mt-4">
          <a routerLink="/" class="d-flex align-items-center mb-md-0 text-decoration-none">
            <img src="../../../assets/logos/logo.png" alt="logo" class="img-fluid ps-2" />
          </a>
          <button type="button" class="close-btn text-danger" data-bs-dismiss="offcanvas" aria-label="Close">
            <i class="far fa-close"></i>
          </button>
        </div>
        <div class="offcanvas-body">
          <ul class="nav col-12 col-md-auto justify-content-center main-menu">
            <li><a routerLink="/" class="nav-link" data-bs-dismiss="offcanvas" aria-label="Close">Home</a></li>
            <li><a routerLink="/skolo" class="nav-link" data-bs-dismiss="offcanvas" aria-label="Close">Skolo</a></li>
            <!-- <li><a routerLink="/skolo/categories" class="nav-link" data-bs-dismiss="offcanvas" aria-label="Close">Categories</a></li> -->
            <li><a routerLink="/skolo/price" class="nav-link" data-bs-dismiss="offcanvas" aria-label="Close">Pricing</a></li>
            <li><a routerLink="/support" class="nav-link" data-bs-dismiss="offcanvas" aria-label="Close">Support</a></li>
          </ul>
          <div class="action-btns mt-4 ps-3">
            <a routerLink="/login" class="btn btn-outline-primary me-2">Sign In</a>
            <a routerLink="/register" class="btn btn-outline-primary me-2">Register</a>
          </div>
        </div>
      </div>
      <!--offcanvas menu end-->
    </div>
  </nav>
</header>
